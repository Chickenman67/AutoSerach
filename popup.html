<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quick Action Popup</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            background-color: #2196F3; 
            color: white; 
            border: none; 
            border-radius: 4px; 
        }
        button:hover { background-color: #0b7dda; }
    </style>
</head>
<body>
  <h3>AutoSearch For Rewards</h3>
  <button id="actionBtn">Start Search</button>
  <script src="popup.js"></script>
</body>
</html>
